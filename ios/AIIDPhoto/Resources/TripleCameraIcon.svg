<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="lens1grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="lens2grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lens3grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="bumpShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="flashGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phone Back -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Camera Bump -->
  <rect x="56" y="56" width="260" height="260" rx="56" fill="#1E293B" filter="url(#bumpShadow)" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Lens 1 (top-left, purple) -->
  <circle cx="139" cy="132" r="44" fill="#0F172A"/>
  <circle cx="139" cy="132" r="36" fill="url(#lens1grad)"/>
  <circle cx="139" cy="132" r="24" fill="#020617"/>
  <circle cx="129" cy="121" r="8" fill="#FFFFFF" opacity="0.33"/>

  <!-- Lens 2 (top-right, cyan) -->
  <circle cx="233" cy="132" r="44" fill="#0F172A"/>
  <circle cx="233" cy="132" r="36" fill="url(#lens2grad)"/>
  <circle cx="233" cy="132" r="24" fill="#020617"/>
  <circle cx="223" cy="121" r="8" fill="#FFFFFF" opacity="0.33"/>

  <!-- Lens 3 (bottom-center, gold) -->
  <circle cx="186" cy="236" r="44" fill="#0F172A"/>
  <circle cx="186" cy="236" r="36" fill="url(#lens3grad)"/>
  <circle cx="186" cy="236" r="24" fill="#020617"/>
  <circle cx="176" cy="225" r="8" fill="#FFFFFF" opacity="0.33"/>

  <!-- Flash LED -->
  <circle cx="279" cy="204" r="9" fill="#FDE68A" filter="url(#flashGlow)"/>

  <!-- Microphone -->
  <circle cx="282" cy="234" r="4" fill="#475569" opacity="0.35"/>

  <!-- AI Sparkle -->
  <path d="M403 348 L406 338 L409 348 L419 351 L409 354 L406 364 L403 354 L393 351Z" fill="#818CF8" opacity="0.67"/>
  <path d="M414 340 L416 335 L418 340 L423 342 L418 344 L416 349 L414 344 L409 342Z" fill="#818CF8" opacity="0.47"/>

  <!-- AI Text -->
  <text x="400" y="420" text-anchor="middle" font-family="'Plus Jakarta Sans', 'SF Pro Display', -apple-system, sans-serif" font-weight="700" font-size="48" fill="url(#aiGrad)" letter-spacing="4">AI</text>
</svg>
