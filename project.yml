name: AIIDPhoto

options:
  minimumXcodeGenVersion: 2.31.0
  deploymentTarget:
    iOS: "26.0"

settings:
  BASE_SDK: iphoneos

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

schemes:
  AIIDPhoto:
    build:
      targets:
        AIIDPhoto: all
    run:
      config: Debug
      # StoreKit local testing config (simulator only)
      storeKitConfiguration: ios/AIIDPhoto/Configuration/Products.storekit
    archive:
      config: Release

targets:
  AIIDPhoto:
    type: application
    platform: iOS
    productName: AIIDPhoto
    deploymentTarget: "26.0"
    sources:
      - path: ios/AIIDPhoto
        excludes:
          - "AppIcon.icon"
      - path: ios/AIIDPhoto/AppIcon.icon
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nexus.aiidphoto
      SWIFT_VERSION: 5.9
      IPHONEOS_DEPLOYMENT_TARGET: 26.0
      TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: K2ZG73WM9X
    dependencies:
      - package: GoogleMobileAds
    resources:
      - path: ios/AIIDPhoto/Resources/Fonts
      - path: ios/AIIDPhoto/Resources/en.lproj
      - path: ios/AIIDPhoto/Resources/zh-Hans.lproj
      - path: ios/AIIDPhoto/Resources/ja.lproj
      - path: ios/AIIDPhoto/Resources/ko.lproj
      - path: ios/AIIDPhoto/Resources/vi.lproj
      - path: ios/AIIDPhoto/Resources/id.lproj
      - path: ios/AIIDPhoto/Resources/pt-BR.lproj

    info:
      # 让 XcodeGen 在此路径生成 Info.plist（目录已存在）
      path: ios/AIIDPhoto/Info.plist
      properties:
        UIAppFonts:
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Bold.ttf
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - ja
          - ko
          - vi
          - id
          - pt-BR
        CFBundleDisplayName: AIIDPhoto
        CFBundleIdentifier: com.nexus.aiidphoto
        CFBundleName: AIIDPhoto
        CFBundleVersion: "2"
        CFBundleShortVersionString: "1.1"
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        NSCameraUsageDescription: "We need camera access for selfies."
        NSPhotoLibraryUsageDescription: "Allow access to pick photos."
        NSPhotoLibraryAddUsageDescription: "Allow saving generated photos."
        # 后端代理地址（GCP Cloud Run，API Key 存储在服务端 Secret Manager）
        BACKEND_BASE_URL: "https://aiidphoto-backend-616059029156.asia-northeast1.run.app"
        # 以下为开发环境直连 Gemini 的配置（生产环境应留空，通过后端代理）
        GEMINI_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent"
        GEMINI_API_KEY: ""  # FIXME: 仅限开发环境，生产环境必须使用后端代理
        CFBundleIconName: AppIcon
        GADApplicationIdentifier: "ca-app-pub-4720104330290543~3080111676"
