name: AIIDPhoto

options:
  minimumXcodeGenVersion: 2.31.0
  deploymentTarget:
    iOS: "26.0"

settings:
  BASE_SDK: iphoneos

schemes:
  AIIDPhoto:
    build:
      targets:
        AIIDPhoto: all
    run:
      config: Debug
      # StoreKit local testing config (simulator only)
      storeKitConfiguration: ios/AIIDPhoto/Configuration/Products.storekit
    archive:
      config: Release

targets:
  AIIDPhoto:
    type: application
    platform: iOS
    productName: AIIDPhoto
    deploymentTarget: "26.0"
    sources:
      - path: ios/AIIDPhoto
        excludes:
          - "AppIcon.icon"
      - path: ios/AIIDPhoto/AppIcon.icon
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yufeicn.aiidphoto
      SWIFT_VERSION: 5.9
      IPHONEOS_DEPLOYMENT_TARGET: 26.0
      TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 4MYXBV84DV
    resources:
      - path: ios/AIIDPhoto/Resources/Fonts
      - path: ios/AIIDPhoto/Resources/en.lproj
      - path: ios/AIIDPhoto/Resources/zh-Hans.lproj
      - path: ios/AIIDPhoto/Resources/ja.lproj
      - path: ios/AIIDPhoto/Resources/ko.lproj
      - path: ios/AIIDPhoto/Resources/vi.lproj
      - path: ios/AIIDPhoto/Resources/id.lproj
      - path: ios/AIIDPhoto/Resources/pt-BR.lproj

    info:
      # 让 XcodeGen 在此路径生成 Info.plist（目录已存在）
      path: ios/AIIDPhoto/Info.plist
      properties:
        UIAppFonts:
          - PlusJakartaSans-SemiBold.ttf
          - PlusJakartaSans-Bold.ttf
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - ja
          - ko
          - vi
          - id
          - pt-BR
        CFBundleDisplayName: 光影形象馆
        CFBundleIdentifier: com.yufeicn.aiidphoto
        CFBundleName: 光影形象馆
        CFBundleVersion: "22"
        CFBundleShortVersionString: "1.1.1"
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        NSCameraUsageDescription: "用于拍摄用于生成证件照或职业形象照的照片。"
        NSPhotoLibraryUsageDescription: "用于从相册选择用于生成证件照或职业形象照的照片。"
        NSPhotoLibraryAddUsageDescription: "用于将生成后的证件照和打印排版保存到相册。"
        # CN production backend on Alibaba Cloud ECS.
        BACKEND_BASE_URL: "https://aiphoto-cn.foyli.cloud"
        APP_API_KEY: "1cce8f8bb9e33377925ae7798457c36fdf3e46945fe32db3cea04db3bd8175f2"
        CFBundleIconName: AppIcon
