<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>规格底色一键适配</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="screen-02">
  <main class="stage">
    <section class="copy">
      <div class="eyebrow">规格适配</div>
      <h1>常用证件规格<br>底色自动处理</h1>
      <p class="subtitle">身份证、护照、签证、考试报名、简历头像，按用途选择尺寸和底色。</p>
    </section>
    <section class="phone">
      <div class="app">
        <div class="nav"><span>选择规格</span><span class="pill">剩3次</span></div>
        <div class="hero-card"><h2>选择用途</h2><p>AI 自动抠图、换底色、裁切到目标像素</p></div>
        <div class="grid">
          <div class="tile"><b>一寸照</b><span>25×35mm</span></div>
          <div class="tile"><b>二寸照</b><span>35×49mm</span></div>
          <div class="tile"><b>护照照</b><span>33×48mm</span></div>
          <div class="tile"><b>自定义</b><span>按机构要求输入</span></div>
        </div>
        <div class="cta">开始生成（剩3次）</div>
      </div>
    </section>
  </main>
</body>
</html>
