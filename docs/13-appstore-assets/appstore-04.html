<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>高清下载 打印排版</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="screen-04">
  <main class="stage">
    <section class="copy">
      <div class="eyebrow">交付完整</div>
      <h1>高清电子照<br>打印排版一起下载</h1>
      <p class="subtitle">线上报名直接上传，线下打印自动生成 5 寸/6 寸排版图。</p>
    </section>
    <section class="phone">
      <div class="app">
        <div class="nav"><span>打印排版</span><span class="pill">已包含</span></div>
        <div class="hero-card"><h2>300DPI 排版图</h2><p>发给附近照相馆或快印店，原图打印即可裁剪</p></div>
        <div class="grid">
          <div class="tile"><b>高清电子照</b><span>保存到系统相册</span></div>
          <div class="tile"><b>6寸排版</b><span>多张自动铺满</span></div>
          <div class="tile"><b>裁剪线</b><span>打印后按线裁剪</span></div>
          <div class="tile"><b>不再加购</b><span>制作包内包含</span></div>
        </div>
        <div class="cta">保存排版照片</div>
      </div>
    </section>
  </main>
</body>
</html>
