<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>iPad 一张成片</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="screen-01">
  <main class="stage ipad">
    <section class="copy">
      <div class="eyebrow">光影形象馆</div>
      <h1>一张成片，三次生成机会</h1>
      <p class="subtitle">适合证件照、考试报名照、简历形象照。优惠价 ¥3.8/张，原价 ¥9.9/张。</p>
    </section>
    <section class="phone">
      <div class="app">
        <div class="nav"><span>光影形象馆</span><span class="pill">购买</span></div>
        <div class="hero-card"><h2>AI职业形象照</h2><p>规格、底色、服装、排版一次完成</p></div>
        <div class="grid">
          <div class="tile"><b>3次生成</b><span>选择最满意结果</span></div>
          <div class="tile"><b>高清下载</b><span>线上报名可用</span></div>
          <div class="tile"><b>打印排版</b><span>5寸/6寸相纸</span></div>
          <div class="tile"><b>非订阅</b><span>不会自动续费</span></div>
        </div>
        <div class="cta">立即制作</div>
      </div>
    </section>
  </main>
</body>
</html>
