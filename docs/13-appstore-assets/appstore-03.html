<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>选择最好的一张</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="screen-03">
  <main class="stage">
    <section class="copy">
      <div class="eyebrow">结果可挑选</div>
      <h1>三次生成<br>选择最好的一张</h1>
      <p class="subtitle">表情、服装、底色不满意可以再生成，历史记录可回看对比。</p>
    </section>
    <section class="phone">
      <div class="app">
        <div class="nav"><span>生成成功</span><span class="pill">剩2次</span></div>
        <div class="result"></div>
        <div class="grid">
          <div class="tile"><b>自然美颜</b><span>保留真实五官</span></div>
          <div class="tile"><b>职业正装</b><span>适合简历和报名</span></div>
          <div class="tile"><b>背景换色</b><span>白底 / 蓝底 / 红底</span></div>
          <div class="tile"><b>重新生成</b><span>成功后才扣次数</span></div>
        </div>
        <div class="cta">保存到相册</div>
      </div>
    </section>
  </main>
</body>
</html>
