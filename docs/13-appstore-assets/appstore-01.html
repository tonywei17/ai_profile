<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>一张成片 三次机会</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="screen-01">
  <main class="stage">
    <section class="copy">
      <div class="eyebrow">光影形象馆</div>
      <h1>一张成片<br>三次生成机会</h1>
      <p class="subtitle">上传生活照，AI 生成标准证件照和职业形象照，选最满意的一张下载。</p>
      <div class="price"><strong>¥3.80</strong><span>限时优惠 · 原价 ¥9.90/张</span></div>
    </section>
    <section class="phone">
      <div class="app">
        <div class="nav"><span>光影形象馆</span><span class="pill">购买</span></div>
        <div class="hero-card"><h2>AI职业形象照</h2><p>简历照 · 证件照 · 护照签证照</p></div>
        <div class="grid">
          <div class="tile"><b>身份证件照</b><span>一寸 / 二寸 / 白底</span></div>
          <div class="tile"><b>护照签证照</b><span>自动裁切与换底</span></div>
          <div class="tile"><b>简历形象照</b><span>自然美颜和正装</span></div>
          <div class="tile"><b>打印排版</b><span>6寸相纸直接打印</span></div>
        </div>
        <div class="cta">立即制作</div>
      </div>
    </section>
  </main>
</body>
</html>
