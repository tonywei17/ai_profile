<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="1024" height="1024">
  <defs>
    <!-- Background: radial gradient from top-left -->
    <radialGradient id="bg" cx="0" cy="0" r="1.414" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#162a4d"/>
      <stop offset="100%" stop-color="#0a1428"/>
    </radialGradient>

    <!-- Neural dot pattern (24×24 grid) -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#3a5a8c"/>
    </pattern>

    <!-- Mask: dots fade top→bottom -->
    <linearGradient id="dotsFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
    <mask id="dotsMask">
      <rect width="320" height="320" fill="url(#dotsFade)"/>
    </mask>

    <!-- Neural crosshatch lines (96×96 grid, 45° + −45°) -->
    <pattern id="crosshatch" width="96" height="96" patternUnits="userSpaceOnUse">
      <line x1="0" y1="96" x2="96" y2="0" stroke="#3a5a8c" stroke-width="2"/>
      <line x1="0" y1="0" x2="96" y2="96" stroke="#3a5a8c" stroke-width="2"/>
    </pattern>

    <!-- Shimmer: subtle 45° diagonal band -->
    <linearGradient id="shimmer" x1="0" y1="1" x2="1" y2="0">
      <stop offset="45%" stop-color="#d6c9b5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d6c9b5" stop-opacity="0.05"/>
      <stop offset="55%" stop-color="#d6c9b5" stop-opacity="0"/>
    </linearGradient>

    <!-- Text glow effect -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#d6c9b5" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded icon clip -->
    <clipPath id="iconClip">
      <rect width="320" height="320" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background fill -->
    <rect width="320" height="320" fill="url(#bg)"/>

    <!-- Neural dot pattern (opacity 0.3, fading top→bottom) -->
    <rect width="320" height="320" fill="url(#dots)" opacity="0.3" mask="url(#dotsMask)"/>

    <!-- Neural crosshatch lines (opacity 0.1) -->
    <rect width="320" height="320" fill="url(#crosshatch)" opacity="0.1"/>

    <!-- Shimmer overlay -->
    <rect width="320" height="320" fill="url(#shimmer)"/>

    <!-- Frame corner: top-left (top + left borders only) -->
    <polyline points="40,80 40,40 80,40" fill="none" stroke="#d6c9b5" stroke-width="1.5" opacity="0.6"/>

    <!-- Frame corner: bottom-right (bottom + right borders only) -->
    <polyline points="240,280 280,280 280,240" fill="none" stroke="#d6c9b5" stroke-width="1.5" opacity="0.6"/>

    <!-- Main text: 証明 -->
    <text x="160" y="144" text-anchor="middle"
          font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
          font-size="82" font-weight="500" fill="#d6c9b5"
          letter-spacing="12.3"
          filter="url(#textGlow)">証明</text>

    <!-- Main text: 写真 -->
    <text x="160" y="238" text-anchor="middle"
          font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
          font-size="82" font-weight="500" fill="#d6c9b5"
          letter-spacing="12.3"
          filter="url(#textGlow)">写真</text>

    <!-- AI badge: separator line -->
    <line x1="140" y1="249" x2="180" y2="249" stroke="#d6c9b5" stroke-width="0.5" opacity="0.8"/>

    <!-- AI badge: text -->
    <text x="160" y="268" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="300" fill="#d6c9b5"
          letter-spacing="5.6"
          opacity="0.8">AI</text>
  </g>

  <!-- Outer border (subtle gold) -->
  <rect width="320" height="320" rx="72" ry="72" fill="none" stroke="#d6c9b5" stroke-opacity="0.1" stroke-width="1"/>
</svg>
